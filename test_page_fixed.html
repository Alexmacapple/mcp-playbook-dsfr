<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test DSFR - Page de diagnostic</title>
    
    <!-- DSFR CSS avec version la plus récente -->
    <link rel="stylesheet" href="https://unpkg.com/@gouvfr/dsfr@1.11.2/dist/dsfr.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@gouvfr/dsfr@1.11.2/dist/utility/utility.min.css">
    
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Marianne, arial, sans-serif;
        }
        
        .debug-info {
            background: #f0f0f0;
            padding: 1rem;
            margin: 1rem;
            border: 2px solid #333;
            font-family: monospace;
        }
        
        .test-component {
            margin: 2rem;
            padding: 1rem;
            border: 1px solid #ddd;
        }
        
        .status { margin: 1rem 0; }
        .ok { color: green; }
        .error { color: red; }
    </style>
</head>
<body>
    <!-- Debug info -->
    <div class="debug-info">
        <h2>🔍 Diagnostic de chargement DSFR</h2>
        <div id="status"></div>
    </div>

    <!-- Header test -->
    <header role="banner" class="fr-header">
        <div class="fr-header__body">
            <div class="fr-container">
                <div class="fr-header__body-row">
                    <div class="fr-header__brand fr-enlarge-link">
                        <div class="fr-header__brand-top">
                            <div class="fr-header__logo">
                                <p class="fr-logo">
                                    République<br>Française
                                </p>
                            </div>
                        </div>
                        <div class="fr-header__service">
                            <p class="fr-header__service-title">Test DSFR</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="fr-container fr-py-8w">
        <h1>Test des composants DSFR</h1>
        
        <!-- Test bouton -->
        <div class="test-component">
            <h2>Test Bouton</h2>
            <button class="fr-btn">
                Bouton test
            </button>
            <button class="fr-btn fr-btn--secondary">
                Bouton secondaire
            </button>
            <button class="fr-btn fr-btn--icon-left fr-icon-arrow-right-line">
                Bouton avec icône
            </button>
        </div>
        
        <!-- Test alerte -->
        <div class="test-component">
            <h2>Test Alerte</h2>
            <div class="fr-alert fr-alert--info">
                <p class="fr-alert__title">Information</p>
                <p>Ceci est une alerte d'information</p>
            </div>
        </div>
        
        <!-- Test accordéon -->
        <div class="test-component">
            <h2>Test Accordéon</h2>
            <section class="fr-accordion">
                <h3 class="fr-accordion__title">
                    <button class="fr-accordion__btn" aria-expanded="false" aria-controls="accordion-test">
                        Titre accordéon
                    </button>
                </h3>
                <div class="fr-collapse" id="accordion-test">
                    <p>Contenu de l'accordéon</p>
                </div>
            </section>
        </div>

        <!-- Test badge -->
        <div class="test-component">
            <h2>Test Badge</h2>
            <p class="fr-badge">Badge</p>
            <p class="fr-badge fr-badge--success">Succès</p>
            <p class="fr-badge fr-badge--error">Erreur</p>
            <p class="fr-badge fr-badge--warning">Attention</p>
            <p class="fr-badge fr-badge--info">Info</p>
            <p class="fr-badge fr-badge--new">Nouveau</p>
        </div>

        <!-- Test icônes -->
        <div class="test-component">
            <h2>Test Icônes</h2>
            <span class="fr-icon-arrow-right-line" aria-hidden="true"></span>
            <span class="fr-icon-checkbox-circle-line" aria-hidden="true"></span>
            <span class="fr-icon-alert-line" aria-hidden="true"></span>
            <span class="fr-icon-account-line" aria-hidden="true"></span>
            <span class="fr-icon-mail-line" aria-hidden="true"></span>
        </div>

        <!-- Test formulaire -->
        <div class="test-component">
            <h2>Test Formulaire</h2>
            <div class="fr-input-group">
                <label class="fr-label" for="text-input">
                    Label du champ
                </label>
                <input class="fr-input" type="text" id="text-input" name="text-input">
            </div>
        </div>
    </main>

    <!-- DSFR JS -->
    <script type="module" src="https://unpkg.com/@gouvfr/dsfr@1.11.2/dist/dsfr.module.min.js"></script>
    <script nomodule src="https://unpkg.com/@gouvfr/dsfr@1.11.2/dist/dsfr.nomodule.min.js"></script>

    <script>
        // Script de diagnostic
        document.addEventListener('DOMContentLoaded', function() {
            const status = document.getElementById('status');
            let messages = [];
            
            // Vérifier le chargement CSS
            const testElement = document.createElement('div');
            testElement.className = 'fr-btn';
            document.body.appendChild(testElement);
            const computedStyle = window.getComputedStyle(testElement);
            
            if (computedStyle.display === 'inline-flex' || computedStyle.padding !== '0px') {
                messages.push('<span class="ok">✅ CSS DSFR chargé correctement</span>');
            } else {
                messages.push('<span class="error">❌ CSS DSFR non chargé</span>');
            }
            document.body.removeChild(testElement);
            
            // Vérifier les fonts
            if (document.fonts && document.fonts.check) {
                document.fonts.ready.then(() => {
                    if (document.fonts.check('1em Marianne')) {
                        messages.push('<span class="ok">✅ Police Marianne chargée</span>');
                    } else {
                        messages.push('<span class="error">⚠️ Police Marianne non disponible (normal si non installée)</span>');
                    }
                });
            }
            
            // Vérifier window.dsfr
            setTimeout(() => {
                if (typeof window.dsfr !== 'undefined') {
                    messages.push('<span class="ok">✅ JavaScript DSFR chargé</span>');
                } else {
                    messages.push('<span class="error">❌ JavaScript DSFR non chargé</span>');
                }
                
                // Afficher les statuts
                status.innerHTML = '<div class="status">' + messages.join('</div><div class="status">') + '</div>';
                
                // Afficher la version
                if (window.dsfr && window.dsfr.version) {
                    status.innerHTML += '<div class="status">Version DSFR: ' + window.dsfr.version + '</div>';
                }
            }, 1000);
            
            console.log('Page de test DSFR chargée');
        });
    </script>
</body>
</html>
